apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: trading-dashboard
  labels:
    app: backend
    app.kubernetes.io/part-of: trading-dashboard
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
