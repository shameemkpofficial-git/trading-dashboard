apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: trading-dashboard
  labels:
    app: frontend
    app.kubernetes.io/part-of: trading-dashboard
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
