name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run unit tests
        run: npm test

  frontend-check:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESRint
        run: npm run lint
        
      - name: Build static assets
        run: npm run build

  docker-build:
    name: Test Docker Builds
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-check]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Backend Container
        run: docker build -t trading-dashboard-backend:ci ./backend
        
      - name: Build Frontend Container
        run: docker build -t trading-dashboard-frontend:ci ./frontend
