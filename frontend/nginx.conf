server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA fallback ───────────────────────────────────────────────────────────
    # Send all unknown paths to index.html so React Router handles them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend REST API proxy ─────────────────────────────────────────────────
    # Strip /api prefix before forwarding so the backend sees plain /tickers etc.
    location /api/ {
        proxy_pass         http://backend-svc:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Backend WebSocket proxy ────────────────────────────────────────────────
    location /ws {
        proxy_pass         http://backend-svc:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;   # keep WS alive for 1 h
    }

    # ── Health check endpoint (used by K8s liveness probe) ────────────────────
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Gzip for assets ────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
}
